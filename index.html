<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Office Work App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: #f4f4f4;
}

.page {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  background: #0078d4;
  color: white;
  border-radius: 6px;
  font-size: 16px;
}

input, select {
  padding: 10px;
  margin: 8px;
  width: 80%;
}
</style>
</head>

<body>

<!-- 🔵 PAGE 1: WELCOME -->
<div id="welcome" class="page active">
  <h1>👋 Welcome</h1>
  <h2>Welcome to MS Office Website</h2>
  <button onclick="nextPage('skills')">Next ➡️</button>
</div>

<!-- 🔵 PAGE 2: SKILLS -->
<div id="skills" class="page">
  <h2>Select Your Skill</h2>
  <button onclick="selectSkill('Construction')">Construction Work</button>
  <button onclick="selectSkill('Cully')">Cully Work</button>
</div>

<!-- 🔵 PAGE 3: CREATE ACCOUNT -->
<div id="account" class="page">
  <h2>Create Account</h2>

  <p>Select Type:</p>
  <button onclick="showWorker()">I want Work</button>
  <button onclick="showProvider()">I want Workers</button>

  <!-- Worker Form -->
  <div id="workerForm" style="display:none;">
    <h3>Worker Form</h3>
    <input type="text" placeholder="Your Name"><br>
    <input type="text" id="skillInput" placeholder="Skill"><br>
    <input type="text" placeholder="Work Type"><br>
    <input type="number" placeholder="Mobile Number"><br>
    <button onclick="submitWorker()">Submit</button>
  </div>

  <!-- Provider Form -->
  <div id="providerForm" style="display:none;">
    <h3>Work Provider Form</h3>
    <input type="text" placeholder="Work Type"><br>
    <input type="text" id="location" placeholder="Location"><br>
    <button onclick="getLocation()">Get Location 📍</button><br>
    <button onclick="submitProvider()">Submit</button>
  </div>

</div>

<script>

// Page Switch
function nextPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

// Skill Select
function selectSkill(skill) {
  document.getElementById("skillInput").value = skill;
  nextPage('account');
}

// Show Worker Form
function showWorker() {
  document.getElementById("workerForm").style.display = "block";
  document.getElementById("providerForm").style.display = "none";
}

// Show Provider Form
function showProvider() {
  document.getElementById("providerForm").style.display = "block";
  document.getElementById("workerForm").style.display = "none";
}

// Submit Worker
function submitWorker() {
  alert("Worker Account Created ✅");
}

// Submit Provider
function submitProvider() {
  alert("Work Posted Successfully ✅");
}

// Location Feature
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      document.getElementById("location").value =
        pos.coords.latitude + ", " + pos.coords.longitude;
    });
  } else {
    alert("Location not supported");
  }
}

</script>

</body>
</html>
