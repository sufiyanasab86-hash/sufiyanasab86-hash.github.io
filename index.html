<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Office Work App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  text-align: center;
}

/* pages */
.page { display:none; padding:20px; }
.active { display:block; }

/* 3D welcome */
#welcome {
  height: 100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.avatar {
  font-size:100px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:black;
  font-weight:bold;
}

/* skills grid */
.skills {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
}

.skill {
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.skill img {
  width:100%;
  height:120px;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- 🔥 1. 3D WELCOME -->
<div id="welcome" class="page active">
  <div class="avatar">👩</div>
  <h1>Welcome 👋</h1>
  <h2>Welcome to MS Office Website</h2>
  <button onclick="nextPage('skills')">Start ➡</button>
</div>

<!-- 🔥 2. SKILLS -->
<div id="skills" class="page">
  <h2>Select Skill</h2>

  <div class="skills">

    <div class="skill" onclick="openSkill('Construction Work')">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
      <p>Construction</p>
    </div>

    <div class="skill" onclick="openSkill('Electrician Work')">
      <img src="https://images.unsplash.com/photo-1581092919534-2b1b0b6b3e4b">
      <p>Electrician</p>
    </div>

    <div class="skill" onclick="openSkill('Cully Work')">
      <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
      <p>Cully Work</p>
    </div>

    <div class="skill" onclick="openSkill('Supari Work')">
      <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2">
      <p>Supari Work</p>
    </div>

  </div>
</div>

<!-- 🔥 3. DETAIL -->
<div id="detail" class="page">
  <h2 id="skillTitle"></h2>
  <p>Yaha is kaam ke liye workers chahiye. Nearby location available.</p>
  <button onclick="nextPage('account')">Apply Work</button>
</div>

<!-- 🔥 4. ACCOUNT -->
<div id="account" class="page">
  <h2>Create Account</h2>

  <button onclick="showWorker()">I Want Work</button>
  <button onclick="showProvider()">I Want Worker</button>

  <!-- Worker -->
  <div id="workerForm" style="display:none;">
    <input placeholder="Name"><br><br>
    <input placeholder="Skill"><br><br>
    <input placeholder="Mobile"><br><br>
    <button onclick="alert('Worker Account Created ✅')">Submit</button>
  </div>

  <!-- Provider -->
  <div id="providerForm" style="display:none;">
    <input placeholder="Work Type"><br><br>
    <input id="location" placeholder="Location"><br><br>
    <button onclick="getLocation()">Get Location</button><br><br>
    <button onclick="alert('Work Posted ✅')">Submit</button>
  </div>

</div>

<script>

// navigation
function nextPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// skill click
function openSkill(skill){
  document.getElementById("skillTitle").innerText = skill;
  nextPage('detail');
}

// role
function showWorker(){
  workerForm.style.display="block";
  providerForm.style.display="none";
}
function showProvider(){
  providerForm.style.display="block";
  workerForm.style.display="none";
}

// location
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    location.value = pos.coords.latitude + "," + pos.coords.longitude;
  });
}

// 🔥 voice girl welcome
window.onload = function(){
  let msg = new SpeechSynthesisUtterance(
    "Welcome to MS Office Website. Aap ka swagat hai"
  );
  msg.lang="hi-IN";
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
