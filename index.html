<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Office App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.page{display:none;padding:20px;}
.active{display:block;}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  margin:10px;
}

input{
  padding:10px;
  width:80%;
  margin:5px;
  border-radius:6px;
  border:none;
}

/* Skills UI */
.skills{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.skill{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.skill img{
  width:100%;
  height:120px;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="page active">
  <h1>👋 Welcome</h1>
  <h2>Welcome to MS Office Website</h2>
  <button onclick="nextPage('skills')">Start</button>
</div>

<!-- SKILLS -->
<div id="skills" class="page">
  <h2>Select Skill</h2>

  <div class="skills">

    <div class="skill" onclick="openSkill('Construction Work')">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
      <p>Construction</p>
    </div>

    <div class="skill" onclick="openSkill('Electrician Work')">
      <img src="https://images.unsplash.com/photo-1581092919534-2b1b0b6b3e4b">
      <p>Electrician</p>
    </div>

    <div class="skill" onclick="openSkill('Cully Work')">
      <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
      <p>Cully Work</p>
    </div>

    <div class="skill" onclick="openSkill('Supari Work')">
      <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2">
      <p>Supari Work</p>
    </div>

  </div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
  <h2 id="skillTitle"></h2>
  <p>Yaha kaam available hai. Apply karne ke liye niche button dabao.</p>
  <button onclick="nextPage('account')">Apply</button>
</div>

<!-- ACCOUNT -->
<div id="account" class="page">
  <h2>Create Account</h2>

  <button onclick="showWorker()">I Want Work</button>
  <button onclick="showProvider()">I Want Worker</button>

  <!-- Worker -->
  <div id="workerForm" style="display:none;">
    <input id="name" placeholder="Name"><br>
    <input id="skill" placeholder="Skill"><br>
    <input id="mobile" placeholder="Mobile"><br>
    <button onclick="submitWorker()">Submit</button>
  </div>

  <!-- Provider -->
  <div id="providerForm" style="display:none;">
    <input placeholder="Work Type"><br>
    <input id="location" placeholder="Location"><br>
    <button onclick="getLocation()">Get Location</button><br>
    <button onclick="alert('Work Posted')">Submit</button>
  </div>

</div>

<script>
let currentPage = 0;

const pages = document.querySelectorAll(".page");

function showPage(index) {
  pages.forEach((page, i) => {
    page.style.display = i === index ? "block" : "none";
  });
}

function nextPage(id) {
  const target = document.getElementById(id);

  pages.forEach(page => {
    page.style.display = "none";
  });

  target.style.display = "block";
}

function openSkill(skill) {
  document.getElementById("skillTitle").innerText = skill;
  nextPage("detail");
}

function showWorker() {
  document.getElementById("workerForm").style.display = "block";
  document.getElementById("providerForm").style.display = "none";
}

function showProvider() {
  document.getElementById("providerForm").style.display = "block";
  document.getElementById("workerForm").style.display = "none";
}

showPage(0);
</script>

</script>

</body>
</html>
