<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Office App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.page{display:none;padding:20px;}
.active{display:block;}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  margin:10px;
}

input{
  padding:10px;
  width:80%;
  margin:5px;
  border-radius:6px;
  border:none;
}

/* Skills UI */
.skills{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.skill{
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

.skill img{
  width:100%;
  height:120px;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="page active">
  <h1>👋 Welcome</h1>
  <h2>Welcome to MS Office Website</h2>
  <button onclick="nextPage('skills')">Start</button>
</div>

<!-- SKILLS -->
<div id="skills" class="page">
  <h2>Select Skill</h2>

  <div class="skills">

    <div class="skill" onclick="openSkill('Construction Work')">
      <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
      <p>Construction</p>
    </div>

    <div class="skill" onclick="openSkill('Electrician Work')">
      <img src="https://images.unsplash.com/photo-1581092919534-2b1b0b6b3e4b">
      <p>Electrician</p>
    </div>

    <div class="skill" onclick="openSkill('Cully Work')">
      <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
      <p>Cully Work</p>
    </div>

    <div class="skill" onclick="openSkill('Supari Work')">
      <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2">
      <p>Supari Work</p>
    </div>

  </div>
</div>

<!-- DETAIL -->
<div id="detail" class="page">
  <h2 id="skillTitle"></h2>
  <p>Yaha kaam available hai. Apply karne ke liye niche button dabao.</p>
  <button onclick="nextPage('account')">Apply</button>
</div>

<!-- ACCOUNT -->
<div id="account" class="page">
  <h2>Create Account</h2>

  <button onclick="showWorker()">I Want Work</button>
  <button onclick="showProvider()">I Want Worker</button>

  <!-- Worker -->
  <div id="workerForm" style="display:none;">
    <input id="name" placeholder="Name"><br>
    <input id="skill" placeholder="Skill"><br>
    <input id="mobile" placeholder="Mobile"><br>
    <button onclick="submitWorker()">Submit</button>
  </div>

  <!-- Provider -->
  <div id="providerForm" style="display:none;">
    <input placeholder="Work Type"><br>
    <input id="location" placeholder="Location"><br>
    <button onclick="getLocation()">Get Location</button><br>
    <button onclick="alert('Work Posted')">Submit</button>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA...",
  authDomain: "ms-office-app.firebaseapp.com",
  projectId: "ms-office-app",
  storageBucket: "ms-office-app.appspot.com",
  messagingSenderId: "819697343763",
  appId: "1:819697343763:web:5fe07875c5281cc1f20ee6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// navigation
window.nextPage = function(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// skill click
window.openSkill = function(skill){
  document.getElementById("skillTitle").innerText = skill;
  nextPage('detail');
}

// role
window.showWorker = function(){
  workerForm.style.display="block";
  providerForm.style.display="none";
}

window.showProvider = function(){
  providerForm.style.display="block";
  workerForm.style.display="none";
}

// save worker
window.submitWorker = async function(){
  let name = document.getElementById("name").value;
  let skill = document.getElementById("skill").value;
  let mobile = document.getElementById("mobile").value;

  if(!name || !skill || !mobile){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db,"workers"),{
    name,skill,mobile,time:new Date()
  });

  alert("Saved in Firebase ✅");
}

// location
window.getLocation = function(){
  navigator.geolocation.getCurrentPosition(pos=>{
    location.value = pos.coords.latitude + "," + pos.coords.longitude;
  });
}

</script>

</body>
</html>
