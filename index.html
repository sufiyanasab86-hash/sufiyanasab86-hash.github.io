<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Car Racing</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

#gameArea{
width:100%;
height:100vh;
background:#333;
position:relative;
overflow:hidden;
}

.road{
width:300px;
height:100vh;
background:#555;
margin:auto;
position:relative;
overflow:hidden;
border-left:5px solid white;
border-right:5px solid white;
}

.line{
width:10px;
height:100px;
background:white;
position:absolute;
left:145px;
}

#car{
width:60px;
height:100px;
background:red;
position:absolute;
bottom:20px;
left:120px;
border-radius:10px;
}

.enemy{
width:60px;
height:100px;
background:yellow;
position:absolute;
top:-120px;
border-radius:10px;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
z-index:100;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>

<div id="gameArea">
<div class="road" id="road">

<div class="line" style="top:0px;"></div>
<div class="line" style="top:150px;"></div>
<div class="line" style="top:300px;"></div>
<div class="line" style="top:450px;"></div>
<div class="line" style="top:600px;"></div>

<div id="car"></div>

<div class="enemy" id="enemy"></div>

</div>
</div>

<script>

const car = document.getElementById("car");
const enemy = document.getElementById("enemy");
const scoreText = document.getElementById("score");

let carLeft = 120;
let enemyTop = -120;
let enemyLeft = Math.floor(Math.random()*240);

let score = 0;

enemy.style.left = enemyLeft + "px";

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft" && carLeft > 0){
carLeft -= 20;
}

if(e.key==="ArrowRight" && carLeft < 240){
carLeft += 20;
}

car.style.left = carLeft + "px";

});

function game(){

enemyTop += 5;

if(enemyTop > 700){
enemyTop = -120;
enemyLeft = Math.floor(Math.random()*240);
enemy.style.left = enemyLeft + "px";

score++;
scoreText.innerHTML = "Score: " + score;
}

enemy.style.top = enemyTop + "px";

let carRect = car.getBoundingClientRect();
let enemyRect = enemy.getBoundingClientRect();

if(
carRect.left < enemyRect.right &&
carRect.right > enemyRect.left &&
carRect.top < enemyRect.bottom &&
carRect.bottom > enemyRect.top
){
alert("Game Over! Score: " + score);
location.reload();
}

requestAnimationFrame(game);

}

game();

</script>

</body>
</html>
