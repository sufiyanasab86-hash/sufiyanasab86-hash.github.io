<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: #f4f4f4;
}

.page { display: none; padding: 20px; }
.active { display: block; }

button {
  padding: 12px 20px;
  margin: 10px;
  background: #0078d4;
  color: white;
  border: none;
  border-radius: 8px;
}

.skill {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

.work {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- 1️⃣ Skills Page (FIRST PAGE) -->
<div id="skills" class="page active">
  <h2>Select Your Skill</h2>

  <div class="skill" onclick="showWork('Construction')">👷 Construction</div>
  <div class="skill" onclick="showWork('Cully')">🧱 Cully Work</div>
  <div class="skill" onclick="showWork('Helper')">🔧 Helper</div>
</div>

<!-- 2️⃣ Work Page -->
<div id="workPage" class="page">
  <h2 id="workTitle"></h2>

  <div id="workList"></div>

  <button onclick="goAccount()">Apply / Start Work</button>
</div>

<!-- 3️⃣ Account Page -->
<div id="account" class="page">
  <h2>Create Account</h2>

  <input placeholder="Name"><br><br>
  <input placeholder="Selected Skill" id="skillInput"><br><br>
  <input placeholder="Mobile Number"><br><br>

  <button onclick="submitAccount()">Create Account</button>
</div>

<script>

/* Show Work Based on Skill */
function showWork(skill){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById("workPage").classList.add('active');

  document.getElementById("workTitle").innerText = skill + " Work Available";

  let workHTML = "";

  if(skill === "Construction"){
    workHTML = `
      <div class="work">Building Work - ₹500/day</div>
      <div class="work">Road Work - ₹450/day</div>
    `;
  }
  else if(skill === "Cully"){
    workHTML = `
      <div class="work">Loading Work - ₹300/day</div>
      <div class="work">Market Work - ₹350/day</div>
    `;
  }
  else{
    workHTML = `
      <div class="work">Shop Helper - ₹400/day</div>
    `;
  }

  document.getElementById("workList").innerHTML = workHTML;

  document.getElementById("skillInput").value = skill;
}

/* Go to Account */
function goAccount(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById("account").classList.add('active');
}

/* Submit */
function submitAccount(){
  alert("Account Created ✅ Now you can start working");
}

</script>

</body>
</html>
