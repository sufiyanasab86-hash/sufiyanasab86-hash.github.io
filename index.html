<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Office App</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* 3D Welcome Screen */
#welcomePage {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  perspective: 1000px;
}

.card {
  width: 300px;
  height: 200px;
  background: linear-gradient(135deg, #0078d4, #00c6ff);
  border-radius: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  transform-style: preserve-3d;
  animation: rotate3d 5s infinite linear;
}

@keyframes rotate3d {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

.card h2 {
  transform: translateZ(50px);
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: #0078d4;
  color: white;
  font-size: 16px;
}

/* बाकी pages */
.page {
  display: none;
  padding: 20px;
  background: #f4f4f4;
  color: black;
  min-height: 100vh;
}

.active {
  display: block;
}
</style>
</head>

<body>

<!-- 3D WELCOME -->
<div id="welcomePage">
  <div class="card">
    <h2>👋 Welcome to<br>MS Office Website</h2>
  </div>
  <button onclick="nextPage()">Enter ➡️</button>
</div>

<!-- MAIN PAGE -->
<div id="mainPage" class="page">
  <h2>👷 Work App</h2>
  <p>Yaha aap kaam dhund sakte ho ya kaam de sakte ho</p>

  <button onclick="alert('Create Account Feature')">Create Account</button>
</div>

<script>
function nextPage() {
  document.getElementById("welcomePage").style.display = "none";
  document.getElementById("mainPage").classList.add("active");
}
</script>

</body>
</html>
