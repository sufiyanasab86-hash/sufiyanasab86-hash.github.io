<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammad Sufiyan Office App</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background:#f4f4f4;
}

.screen {
  display:none;
  padding:20px;
}

.active {
  display:block;
}

button {
  padding:12px 20px;
  margin:10px;
  background:#0078d4;
  color:white;
  border:none;
  border-radius:6px;
}

input, select {
  padding:10px;
  margin:8px;
  width:80%;
}

.avatar {
  font-size:60px;
  animation: float 2s infinite;
}

@keyframes float {
  0% {transform:translateY(0)}
  50% {transform:translateY(-10px)}
  100% {transform:translateY(0)}
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">
  <div class="avatar">👨‍💼</div>
  <h2>Hello 👋</h2>
  <h3>Welcome to Mohammad Sufiyan Office Website</h3>
  <button onclick="next(2)">Next ➡️</button>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">
  <h2>How this app works</h2>
  <p>Yaha aap kaam dhund sakte ho ya kaam de sakte ho</p>
  <p>Construction & Cully work available</p>
  <button onclick="next(3)">Next ➡️</button>
</div>

<!-- SCREEN 3 -->
<div id="screen3" class="screen">
  <h2>Login / Create Account</h2>
  <button onclick="next(4)">Create Account</button>
</div>

<!-- SCREEN 4 -->
<div id="screen4" class="screen">
  <h2>Create Account</h2>

  <input placeholder="Name"><br>
  <input placeholder="Mobile Number"><br>

  <select>
    <option>Work Category</option>
    <option>Construction Work</option>
    <option>Cully Work</option>
  </select><br>

  <input placeholder="Enter Work Skills"><br>

  <button onclick="alert('OTP Sent!')">Send OTP</button><br>
  <input placeholder="Enter OTP"><br>

  <button onclick="next(5)">Verify</button>
</div>

<!-- SCREEN 5 -->
<div id="screen5" class="screen">
  <h2>Post Work</h2>
  <p>Type your work requirement</p>

  <input placeholder="What work you need?"><br>

  <button onclick="alert('Work Posted!')">Submit</button>
</div>

<script>
function next(num){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen'+num).classList.add('active');
}
</script>

</body>
</html>
