 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Office Work App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}

/* Pages */
.page {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* Welcome */
#welcome {
  height: 100vh;
  background: linear-gradient(135deg,#0078d4,#00c6ff);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Floating girl */
.girl {
  width: 180px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* Buttons */
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  background: #0078d4;
  color: white;
  border-radius: 8px;
  font-size: 16px;
}

/* Skills UI */
.skill-box {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.3s;
}

.skill-box:hover {
  transform: scale(1.05);
  background: #0078d4;
  color: white;
}

/* Form */
input, select {
  padding: 10px;
  margin: 8px;
  width: 80%;
}
</style>
</head>

<body>

<!-- 🔵 WELCOME PAGE -->
<div id="welcome" class="page active">

  <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="girl">

  <h1>👋 Hello</h1>
  <h2>Welcome to MS Office Website</h2>

  <button onclick="goToSkills()">Start ➡️</button>
</div>

<!-- 🔵 SKILLS PAGE -->
<div id="skills" class="page">

  <h2>Select Your Skill</h2>

  <div class="skill-box" onclick="selectSkill('Construction')">
    🏗️
    <h3>Construction Work</h3>
  </div>

  <div class="skill-box" onclick="selectSkill('Cully')">
    🧱
    <h3>Cully Work</h3>
  </div>

</div>

<!-- 🔵 ACCOUNT PAGE -->
<div id="account" class="page">

  <h2>Create Account</h2>

  <p>Select Type:</p>

  <button onclick="showWorker()">I want Work</button>
  <button onclick="showProvider()">I want Workers</button>

  <!-- Worker -->
  <div id="workerForm" style="display:none;">
    <h3>Worker Form</h3>
    <input type="text" placeholder="Name"><br>
    <input type="text" id="skillInput" placeholder="Skill"><br>
    <input type="text" placeholder="Work Type"><br>
    <input type="number" placeholder="Mobile Number"><br>
    <button onclick="submitWorker()">Submit</button>
  </div>

  <!-- Provider -->
  <div id="providerForm" style="display:none;">
    <h3>Work Provider Form</h3>
    <input type="text" placeholder="Work Type"><br>
    <input type="text" id="location" placeholder="Location"><br>
    <button onclick="getLocation()">Get Location 📍</button><br>
    <button onclick="submitProvider()">Submit</button>
  </div>

</div>

<script>

/* Page Navigation */
function goToSkills() {
  document.getElementById("welcome").style.display = "none";
  document.getElementById("skills").classList.add("active");
}

/* Skill Select */
function selectSkill(skill) {
  localStorage.setItem("skill", skill);
  document.getElementById("skills").style.display = "none";
  document.getElementById("account").classList.add("active");

  document.getElementById("skillInput").value = skill;
}

/* Role Forms */
function showWorker() {
  document.getElementById("workerForm").style.display = "block";
  document.getElementById("providerForm").style.display = "none";
}

function showProvider() {
  document.getElementById("providerForm").style.display = "block";
  document.getElementById("workerForm").style.display = "none";
}

/* Submit */
function submitWorker() {
  alert("Worker Account Created ✅");
}

function submitProvider() {
  alert("Work Posted Successfully ✅");
}

/* Location */
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      document.getElementById("location").value =
        pos.coords.latitude + ", " + pos.coords.longitude;
    });
  }
}

/* 🔊 Voice Welcome */
window.onload = function() {
  let msg = new SpeechSynthesisUtterance(
    "Welcome to MS Office Website. Mein aap ka swagat karti hoon"
  );
  msg.lang = "hi-IN";
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
